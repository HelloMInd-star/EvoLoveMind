<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvolveMind · 经济模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .container {
            max-width: 960px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 36px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h2 {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
        }

        .header h2 span {
            color: #4f46e5;
        }

        .header .back {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            padding: 6px 16px;
            border-radius: 20px;
            transition: 0.2s;
        }

        .header .back:hover {
            background: #f1f5f9;
            border-color: #4f46e5;
            color: #4f46e5;
        }

        /* 画布 */
        .canvas-wrapper {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.02);
            cursor: default;
            touch-action: none;
        }

        /* 控制区 */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px 24px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            display: flex;
            justify-content: space-between;
        }

        .control-group label span {
            color: #4f46e5;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #4f46e5;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
        }

        /* 状态面板 */
        .status-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .status-item {
            display: flex;
            flex-direction: column;
        }

        .status-item .label {
            color: #94a3b8;
            font-size: 12px;
        }

        .status-item .value {
            font-weight: 600;
            color: #0f172a;
            font-size: 16px;
            margin-top: 2px;
        }

        .status-item .value.highlight {
            color: #4f46e5;
        }

        /* 底部按钮 */
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .actions button {
            padding: 8px 24px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            background: #f1f5f9;
            color: #0f172a;
        }

        .actions button.primary {
            background: #4f46e5;
            color: white;
        }

        .actions button.primary:hover {
            background: #4338ca;
        }

        .actions button:hover {
            background: #e2e8f0;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .container {
                padding: 24px 16px 20px;
            }
            .controls {
                grid-template-columns: 1fr 1fr;
            }
            .status-panel {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .controls {
                grid-template-columns: 1fr;
            }
            .status-panel {
                grid-template-columns: 1fr;
            }
            .header h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 头部 -->
    <div class="header">
        <h2>📈 经济模式 · <span>供给需求</span></h2>
        <a href="../index.html" class="back">← 返回首页</a>
    </div>

    <!-- 画布 -->
    <div class="canvas-wrapper">
        <canvas id="canvas" width="800" height="400"></canvas>
    </div>

    <!-- 控制区 -->
    <div class="controls">
        <div class="control-group">
            <label>弹性（波动幅度） <span id="elasticValue">1.0</span></label>
            <input type="range" id="elastic" min="0.2" max="2.0" step="0.05" value="1.0">
        </div>
        <div class="control-group">
            <label>政策强度（基准偏移） <span id="policyValue">0.0</span></label>
            <input type="range" id="policy" min="-50" max="50" step="1" value="0">
        </div>
        <div class="control-group">
            <label>运行速度 <span id="speedValue">1.0</span></label>
            <input type="range" id="speed" min="0.0" max="2.5" step="0.1" value="1.0">
        </div>
    </div>

    <!-- 状态面板 -->
    <div class="status-panel">
        <div class="status-item">
            <span class="label">当前角度</span>
            <span class="value" id="angleDisplay">0°</span>
        </div>
        <div class="status-item">
            <span class="label">需求指数</span>
            <span class="value highlight" id="demandDisplay">50%</span>
        </div>
        <div class="status-item">
            <span class="label">供给指数</span>
            <span class="value highlight" id="supplyDisplay">50%</span>
        </div>
        <div class="status-item">
            <span class="label">市场状态</span>
            <span class="value" id="stateDisplay">⚖️ 均衡</span>
        </div>
    </div>

    <!-- 按钮 -->
    <div class="actions">
        <button class="primary" id="toggleBtn">⏸️ 暂停</button>
        <button id="resetBtn">🔄 重置</button>
    </div>

</div>

<script>
    (function() {
        // ===== DOM 引用 =====
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const elasticSlider = document.getElementById('elastic');
        const policySlider = document.getElementById('policy');
        const speedSlider = document.getElementById('speed');

        const elasticValue = document.getElementById('elasticValue');
        const policyValue = document.getElementById('policyValue');
        const speedValue = document.getElementById('speedValue');

        const angleDisplay = document.getElementById('angleDisplay');
        const demandDisplay = document.getElementById('demandDisplay');
        const supplyDisplay = document.getElementById('supplyDisplay');
        const stateDisplay = document.getElementById('stateDisplay');

        const toggleBtn = document.getElementById('toggleBtn');
        const resetBtn = document.getElementById('resetBtn');

        // ===== 状态 =====
        let angle = 0;              // 当前角度（弧度）
        let running = true;
        let animationId = null;

        // 参数（从滑块读取）
        function getParams() {
            return {
                elastic: parseFloat(elasticSlider.value),
                policy: parseFloat(policySlider.value),
                speed: parseFloat(speedSlider.value)
            };
        }

        // ===== 绘制 =====
        function draw() {
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;

            const params = getParams();
            const elastic = params.elastic;
            const policy = params.policy;
            const speed = params.speed;

            // 基础半径（受弹性影响）
            const baseRadius = 120;
            const radius = baseRadius * elastic;

            // 政策偏移（垂直偏移圆心）
            const offsetY = policy * 0.6;   // 让滑动范围视觉合适

            // 需求 = 垂直方向（sin），供给 = 水平方向（cos）
            const demand = Math.sin(angle) * radius + offsetY;
            const supply = Math.cos(angle) * radius;

            // 归一化显示（映射到 0~100%）
            const maxOffset = baseRadius * 2.0 + 50;
            const demandPercent = Math.round(((demand + maxOffset) / (maxOffset * 2)) * 100);
            const supplyPercent = Math.round(((supply + maxOffset) / (maxOffset * 2)) * 100);

            // 市场状态
            let stateText = '⚖️ 均衡';
            if (demandPercent > supplyPercent + 8) stateText = '📈 供不应求';
            else if (supplyPercent > demandPercent + 8) stateText = '📉 供过于求';

            // --- 绘制 ---
            ctx.clearRect(0, 0, w, h);

            // 1. 背景网格（极浅）
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 10; i++) {
                const x = (i / 10) * w;
                const y = (i / 10) * h;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }

            // 2. 基准线（水平 + 垂直）
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 6]);
            ctx.beginPath();
            ctx.moveTo(0, cy + offsetY);
            ctx.lineTo(w, cy + offsetY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx, 0);
            ctx.lineTo(cx, h);
            ctx.stroke();
            ctx.setLineDash([]);

            // 3. 政策线（显示基准偏移）
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, cy + offsetY);
            ctx.lineTo(w, cy + offsetY);
            ctx.stroke();

            // 4. 画圆（轨迹）
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let t = 0; t <= Math.PI * 2; t += 0.02) {
                const dx = Math.cos(t) * radius;
                const dy = Math.sin(t) * radius + offsetY;
                if (t === 0) ctx.moveTo(cx + dx, cy + dy);
                else ctx.lineTo(cx + dx, cy + dy);
            }
            ctx.stroke();

            // 5. 需求点（垂直）
            const demandX = cx;
            const demandY = cy + demand;
            ctx.fillStyle = '#4f46e5';
            ctx.shadowColor = 'rgba(79,70,229,0.2)';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(demandX, demandY, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('需求', demandX, demandY - 14);

            // 6. 供给点（水平）
            const supplyX = cx + supply;
            const supplyY = cy + offsetY;
            ctx.fillStyle = '#0f172a';
            ctx.shadowColor = 'rgba(15,23,42,0.15)';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(supplyX, supplyY, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('供给', supplyX, supplyY - 14);

            // 7. 圆心标记（政策点）
            ctx.fillStyle = '#94a3b8';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(cx, cy + offsetY, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#64748b';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('⚙️ 政策', cx + 8, cy + offsetY + 6);

            // 8. 角度线（从圆心到需求点）
            ctx.strokeStyle = '#4f46e5';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 6]);
            ctx.beginPath();
            ctx.moveTo(cx, cy + offsetY);
            ctx.lineTo(demandX, demandY);
            ctx.stroke();
            ctx.setLineDash([]);

            // 9. 角度标签
            const deg = Math.round((angle * 180 / Math.PI) % 360);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(`${deg}°`, cx + 20, cy + offsetY + 8);

            // ---- 更新状态显示 ----
            angleDisplay.textContent = `${deg}°`;
            demandDisplay.textContent = `${Math.min(100, Math.max(0, demandPercent))}%`;
            supplyDisplay.textContent = `${Math.min(100, Math.max(0, supplyPercent))}%`;
            stateDisplay.textContent = stateText;
        }

        // ===== 动画循环 =====
        function animate() {
            if (running) {
                const params = getParams();
                angle += 0.02 * params.speed;
                if (angle > Math.PI * 2) angle -= Math.PI * 2;
            }
            draw();
            animationId = requestAnimationFrame(animate);
        }

        // ===== 控制函数 =====
        function toggleRun() {
            running = !running;
            toggleBtn.textContent = running ? '⏸️ 暂停' : '▶️ 运行';
        }

        function resetAll() {
            angle = 0;
            elasticSlider.value = '1.0';
            policySlider.value = '0';
            speedSlider.value = '1.0';
            elasticValue.textContent = '1.0';
            policyValue.textContent = '0.0';
            speedValue.textContent = '1.0';
            running = true;
            toggleBtn.textContent = '⏸️ 暂停';
            // 重绘
            draw();
        }

        // ===== 滑块实时更新 =====
        elasticSlider.addEventListener('input', function() {
            elasticValue.textContent = this.value;
        });
        policySlider.addEventListener('input', function() {
            policyValue.textContent = this.value;
        });
        speedSlider.addEventListener('input', function() {
            speedValue.textContent = this.value;
        });

        // ===== 按钮事件 =====
        toggleBtn.addEventListener('click', toggleRun);
        resetBtn.addEventListener('click', resetAll);

        // ===== 启动 =====
        animate();
        draw();

        // ===== 窗口尺寸自适应（仅防止画布变形） =====
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            // canvas 已固定尺寸 800x400，无需缩放，仅保持比例
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ===== 返回首页前清理动画 =====
        window.addEventListener('beforeunload', function() {
            if (animationId) cancelAnimationFrame(animationId);
        });

    })();
</script>

</body>
</html>
