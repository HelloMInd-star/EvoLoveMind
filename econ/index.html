<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvolveMind · 经济模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .container {
            max-width: 960px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 36px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h2 {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
        }
        .header h2 span {
            color: #4f46e5;
        }
        .header .nav-links a {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            padding: 6px 16px;
            border-radius: 20px;
            transition: 0.2s;
            margin-left: 8px;
        }
        .header .nav-links a:hover {
            background: #f1f5f9;
            border-color: #4f46e5;
            color: #4f46e5;
        }
        .canvas-wrapper {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #ffffff;
            border-radius: 16px;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px 24px;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .control-group label {
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            display: flex;
            justify-content: space-between;
        }
        .control-group label span {
            color: #4f46e5;
            font-weight: 600;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #4f46e5;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
        }
        .status-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .status-item {
            display: flex;
            flex-direction: column;
        }
        .status-item .label {
            color: #94a3b8;
            font-size: 12px;
        }
        .status-item .value {
            font-weight: 600;
            color: #0f172a;
            font-size: 16px;
            margin-top: 2px;
        }
        .status-item .value.highlight {
            color: #4f46e5;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .actions button {
            padding: 8px 24px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            background: #f1f5f9;
            color: #0f172a;
        }
        .actions button.primary {
            background: #4f46e5;
            color: white;
        }
        .actions button.primary:hover {
            background: #4338ca;
        }
        .actions button:hover {
            background: #e2e8f0;
        }
        .actions .theory-link {
            margin-left: auto;
            background: #eef2ff;
            color: #4f46e5;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #4f46e5;
            transition: 0.2s;
        }
        .actions .theory-link:hover {
            background: #4f46e5;
            color: white;
        }
        @media (max-width: 700px) {
            .controls {
                grid-template-columns: 1fr 1fr;
            }
            .status-panel {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 480px) {
            .container {
                padding: 24px 16px 20px;
            }
            .controls {
                grid-template-columns: 1fr;
            }
            .status-panel {
                grid-template-columns: 1fr;
            }
            .header h2 {
                font-size: 20px;
            }
            .actions .theory-link {
                margin-left: 0;
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 头部导航 -->
    <div class="header">
        <h2>📈 经济模式 · <span>供给需求</span></h2>
        <div class="nav-links">
            <a href="../index.html">🏠 首页</a>
        </div>
    </div>

    <!-- 画布 -->
    <div class="canvas-wrapper">
        <canvas id="canvas" width="800" height="400"></canvas>
    </div>

    <!-- 控制区 -->
    <div class="controls">
        <div class="control-group">
            <label>弹性（波动幅度） <span id="elasticValue">1.0</span></label>
            <input type="range" id="elastic" min="0.2" max="2.0" step="0.05" value="1.0">
        </div>
        <div class="control-group">
            <label>政策强度（基准偏移） <span id="policyValue">0.0</span></label>
            <input type="range" id="policy" min="-50" max="50" step="1" value="0">
        </div>
        <div class="control-group">
            <label>运行速度 <span id="speedValue">1.0</span></label>
            <input type="range" id="speed" min="0.0" max="2.5" step="0.1" value="1.0">
        </div>
    </div>

    <!-- 状态面板 -->
    <div class="status-panel">
        <div class="status-item">
            <span class="label">当前角度</span>
            <span class="value" id="angleDisplay">0°</span>
        </div>
        <div class="status-item">
            <span class="label">需求指数</span>
            <span class="value highlight" id="demandDisplay">50%</span>
        </div>
        <div class="status-item">
            <span class="label">供给指数</span>
            <span class="value highlight" id="supplyDisplay">50%</span>
        </div>
        <div class="status-item">
            <span class="label">市场状态</span>
            <span class="value" id="stateDisplay">⚖️ 均衡</span>
        </div>
    </div>

    <!-- 操作区 -->
    <div class="actions">
        <button class="primary" id="toggleBtn">⏸️ 暂停</button>
        <button id="resetBtn">🔄 重置</button>
        <a href="theory.html" class="theory-link">📖 查看理论分析</a>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const elasticSlider = document.getElementById('elastic');
        const policySlider = document.getElementById('policy');
        const speedSlider = document.getElementById('speed');
        const elasticValue = document.getElementById('elasticValue');
        const policyValue = document.getElementById('policyValue');
        const speedValue = document.getElementById('speedValue');
        const angleDisplay = document.getElementById('angleDisplay');
        const demandDisplay = document.getElementById('demandDisplay');
        const supplyDisplay = document.getElementById('supplyDisplay');
        const stateDisplay = document.getElementById('stateDisplay');
        const toggleBtn = document.getElementById('toggleBtn');
        const resetBtn = document.getElementById('resetBtn');

        let angle = 0;
        let running = true;
        let animationId = null;

        function getParams() {
            return {
                elastic: parseFloat(elasticSlider.value),
                policy: parseFloat(policySlider.value),
                speed: parseFloat(speedSlider.value)
            };
        }

        function draw() {
            const w = canvas.width,
                h = canvas.height;
            const cx = w / 2,
                cy = h / 2;
            const params = getParams();
            const elastic = params.elastic;
            const policy = params.policy;
            const radius = 120 * elastic;
            const offsetY = policy * 0.6;

            const demand = Math.sin(angle) * radius + offsetY;
            const supply = Math.cos(angle) * radius;

            const maxOffset = 120 * 2.0 + 50;
            const demandPercent = Math.round(((demand + maxOffset) / (maxOffset * 2)) * 100);
            const supplyPercent = Math.round(((supply + maxOffset) / (maxOffset * 2)) * 100);

            let stateText = '⚖️ 均衡';
            if (demandPercent > supplyPercent + 8) stateText = '📈 供不应求';
            else if (supplyPercent > demandPercent + 8) stateText = '📉 供过于求';

            ctx.clearRect(0, 0, w, h);

            // 网格
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 10; i++) {
                const x = (i / 10) * w,
                    y = (i / 10) * h;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }

            // 基准线
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 6]);
            ctx.beginPath();
            ctx.moveTo(0, cy + offsetY);
            ctx.lineTo(w, cy + offsetY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx, 0);
            ctx.lineTo(cx, h);
            ctx.stroke();
            ctx.setLineDash([]);

            // 圆
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let t = 0; t <= Math.PI * 2; t += 0.02) {
                const dx = Math.cos(t) * radius;
                const dy = Math.sin(t) * radius + offsetY;
                if (t === 0) ctx.moveTo(cx + dx, cy + dy);
                else ctx.lineTo(cx + dx, cy + dy);
            }
            ctx.stroke();

            // 需求点
            const demandX = cx,
                demandY = cy + demand;
            ctx.fillStyle = '#4f46e5';
            ctx.shadowColor = 'rgba(79,70,229,0.2)';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(demandX, demandY, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('需求', demandX, demandY - 14);

            // 供给点
            const supplyX = cx + supply,
                supplyY = cy + offsetY;
            ctx.fillStyle = '#0f172a';
            ctx.shadowColor = 'rgba(15,23,42,0.15)';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(supplyX, supplyY, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('供给', supplyX, supplyY - 14);

            // 圆心
            ctx.fillStyle = '#94a3b8';
            ctx.beginPath();
            ctx.arc(cx, cy + offsetY, 4, 0, Math.PI * 2);
            ctx.fill();

            const deg = Math.round((angle * 180 / Math.PI) % 360);
            angleDisplay.textContent = `${deg}°`;
            demandDisplay.textContent = `${Math.min(100, Math.max(0, demandPercent))}%`;
            supplyDisplay.textContent = `${Math.min(100, Math.max(0, supplyPercent))}%`;
            stateDisplay.textContent = stateText;
        }

        function animate() {
            if (running) {
                const params = getParams();
                angle += 0.02 * params.speed;
                if (angle > Math.PI * 2) angle -= Math.PI * 2;
            }
            draw();
            animationId = requestAnimationFrame(animate);
        }

        function toggleRun() {
            running = !running;
            toggleBtn.textContent = running ? '⏸️ 暂停' : '▶️ 运行';
        }

        function resetAll() {
            angle = 0;
            elasticSlider.value = '1.0';
            policySlider.value = '0';
            speedSlider.value = '1.0';
            elasticValue.textContent = '1.0';
            policyValue.textContent = '0.0';
            speedValue.textContent = '1.0';
            running = true;
            toggleBtn.textContent = '⏸️ 暂停';
            draw();
        }

        elasticSlider.addEventListener('input', function() {
            elasticValue.textContent = this.value;
        });
        policySlider.addEventListener('input', function() {
            policyValue.textContent = this.value;
        });
        speedSlider.addEventListener('input', function() {
            speedValue.textContent = this.value;
        });

        toggleBtn.addEventListener('click', toggleRun);
        resetBtn.addEventListener('click', resetAll);

        animate();
        draw();

        window.addEventListener('beforeunload', function() {
            if (animationId) cancelAnimationFrame(animationId);
        });
    })();
</script>
</body>
</html>
